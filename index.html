<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; line-height: 1.6; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        nav { 
            background-color: #f8f9fa; 
            padding: 8px 16px; 
            border-bottom: 1px solid #ccc; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            position: sticky;
            top: 0;
            z-index: 5;
            flex-shrink: 0;
        }
        nav a { margin-right: 12px; text-decoration: none; color: #0366d6; font-weight: bold; }
        .container { display: flex; flex-grow: 1; overflow: hidden; }
        #file-list { width: clamp(260px, 23vw, 320px); border-right: 1px solid #ccc; padding: 0 14px 14px; overflow-y: auto; box-sizing: border-box; flex-shrink: 0; }
        #file-content {
            flex-grow: 1;
            min-width: 0;
            min-height: 0;
            padding: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .loaded-filter-panel {
            flex-shrink: 0;
            border: 1px solid #e4e9f2;
            border-radius: 8px;
            background: rgba(248, 250, 252, 0.92);
            padding: 6px;
            margin-bottom: 6px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
        }
        .loaded-filter-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 5px;
            color: #1f2937;
            font-size: 0.86em;
            font-weight: 800;
        }
        .loaded-filter-actions {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .loaded-filter-head button,
        .loaded-filter-chip {
            border: 1px solid #d8e0ec;
            border-radius: 999px;
            background: #fff;
            color: #42526b;
            cursor: pointer;
            font: inherit;
        }
        .loaded-filter-head button {
            padding: 3px 8px;
            font-size: 0.78em;
            font-weight: 700;
        }
        .loaded-filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            max-height: 64px;
            overflow: auto;
        }
        .loaded-filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            min-height: 24px;
            padding: 2px 7px;
            font-size: 0.78em;
            white-space: nowrap;
        }
        .loaded-filter-chip:hover,
        .loaded-filter-chip[aria-pressed="true"],
        .loaded-filter-head button:hover {
            border-color: #0b63d1;
            background: #eef4ff;
            color: #0b63d1;
        }
        .loaded-filter-count {
            color: #7a8699;
            font-size: 0.88em;
            font-weight: 700;
        }
        .loaded-filter-chip[aria-pressed="true"] .loaded-filter-count {
            color: inherit;
        }
        .loaded-filter-panel.is-collapsed {
            padding-bottom: 6px;
        }
        .loaded-filter-panel.is-collapsed .loaded-filter-head {
            margin-bottom: 0;
        }
        .loaded-filter-panel.is-collapsed .loaded-filter-chips {
            display: none;
        }
        /* SOFTM-publishing-github 2026-07-09: 관리자 퍼블리싱 GitHub 반영 패널/토글 스타일 시작 */
        .publishing-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            border: 1px solid #d8e0ec;
            border-radius: 8px;
            background: #f8fafc;
            padding: 8px;
            margin-bottom: 8px;
            color: #334155;
            font-size: 0.86em;
        }
        .publishing-token-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 800;
        }
        .publishing-token-input {
            width: min(280px, 42vw);
            min-height: 32px;
            border: 1px solid #cbd5e1;
            border-radius: 7px;
            padding: 0 8px;
            font: inherit;
        }
        .publishing-save-button,
        .publishing-toggle {
            border: 1px solid #cbd5e1;
            border-radius: 999px;
            background: #fff;
            color: #1f2937;
            cursor: pointer;
            font: inherit;
            font-weight: 800;
        }
        .publishing-save-button {
            min-height: 32px;
            padding: 0 10px;
        }
        .publishing-save-button:not(:disabled):hover,
        .publishing-toggle:hover {
            border-color: #0b63d1;
            color: #0b63d1;
        }
        .publishing-save-button:disabled {
            cursor: default;
            opacity: 0.55;
        }
        .publishing-refresh-button.is-attention:not(:disabled) {
            border-color: #f79009;
            background: #fffaeb;
            color: #b54708;
        }
        .publishing-toggle {
            flex: 0 0 auto;
            min-height: 26px;
            padding: 0 8px;
            font-size: 0.78em;
            line-height: 1;
            white-space: nowrap; /* SOFTM-publishing-current-state 2026-07-09: 현재 게시 상태 문구가 파일 행에서 줄바꿈되지 않게 고정 */
        }
        .publishing-toggle[data-published="false"] {
            border-color: #f1b8b8;
            background: #fff7ed;
            color: #b42318;
        }
        .publishing-meta {
            font-weight: 800;
            color: #64748b;
        }
        .publishing-sync-chip {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            border: 1px solid #cbd5e1;
            border-radius: 999px;
            padding: 0 8px;
            background: #fff;
            color: #475467;
            font-weight: 800;
            white-space: nowrap;
        }
        .publishing-sync-chip[data-type="success"] {
            border-color: #abefc6;
            background: #ecfdf3;
            color: #067647;
        }
        .publishing-sync-chip[data-type="pending"] {
            border-color: #fedf89;
            background: #fffaeb;
            color: #b54708;
        }
        .publishing-sync-chip[data-type="error"] {
            border-color: #fecdca;
            background: #fef3f2;
            color: #b42318;
        } /* SOFTM-publishing-sync-notice 2026-07-10: 원격 grant SHA 기준 동기화 상태 chip 스타일 추가 */
        .publishing-status {
            flex: 1 1 180px;
            min-width: 160px;
            color: #64748b;
        }
        .publishing-status[data-type="error"] {
            color: #b42318;
        }
        .publishing-status[data-type="success"] {
            color: #067647;
        }
        .directory-item-publishing {
            margin-left: 0;
        }
        /* SOFTM-publishing-github 2026-07-09: 관리자 퍼블리싱 GitHub 반영 패널/토글 스타일 끝 */
        h1, h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        ul { list-style-type: none; padding-left: 0; }
        li {
            margin-bottom: 10px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 10px;
            transition: background-color 0.15s ease, transform 0.15s ease;
        }
        li:hover {
            background-color: #f1f5ff;
        }
        li.selected-note:hover {
            background-color: #d2f1f4;
        }
        li.selected-note {
            background-color: #e0f7fa;
            border-radius: 10px;
            padding: 6px 10px;
            position: relative;
        }
        li.selected-note::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: 4px;
            background-color: #00a6c7;
        }
        a { text-decoration: none; color: #0366d6; }
        a:hover { text-decoration: underline; }
        img { max-width: 100%; height: auto; }
        #searchInput,
        #mainDirectorySearchInput {
            width: 100%;
            padding: 9px 10px;
            box-sizing: border-box;
            border: 1px solid #d8e0ec;
            border-radius: 10px;
            font: inherit;
        }
        .publishing-condition-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 6px;
            align-items: center;
        }
        .publishing-condition-row > input {
            min-width: 0;
        }
        .publishing-condition-field {
            display: block;
            min-width: 0;
        }
        .publishing-condition-select {
            width: 92px;
            height: 40px;
            box-sizing: border-box;
            border: 1px solid #d8e0ec;
            border-radius: 10px;
            background: #fff;
            color: #24292f;
            font: inherit;
            font-size: 0.86em;
            font-weight: 700;
            padding: 0 24px 0 10px;
        } /* SOFTM-publishing-filter-inline 2026-07-10: 게시 조건 row를 없애고 검색 입력 줄 오른쪽에 배치 */
        .list-header {
            position: sticky;
            top: 0;
            z-index: 2;
            background-color: #fff;
            padding: 14px 0 8px;
        }
        .list-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .list-header h1 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.7em;
            line-height: 1.2;
        }
        .mobile-panel-toggle {
            display: none;
            border: 1px solid #d8e0ec;
            border-radius: 999px;
            background: #fff;
            color: #0b63d1;
            cursor: pointer;
            font: inherit;
            font-size: 0.86em;
            font-weight: 800;
            min-height: 36px;
            padding: 6px 12px;
            white-space: nowrap;
        }
        .mobile-panel-toggle:focus-visible {
            outline: 3px solid rgba(11, 99, 209, 0.28);
            outline-offset: 2px;
        }
        .left-menu-tabs {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
            margin-bottom: 8px;
            padding: 4px;
            border: 1px solid #e0e7f1;
            border-radius: 12px;
            background: #f4f7fb;
        }
        .left-menu-tab {
            border: 0;
            border-radius: 9px;
            background: transparent;
            color: #5c6b82;
            cursor: pointer;
            font: inherit;
            font-size: 0.92em;
            font-weight: 800;
            padding: 6px 8px;
        }
        .left-menu-tab:hover,
        .left-menu-tab.is-active {
            background: #fff;
            color: #0b63d1;
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
        }
        .left-tab-panel {
            margin-bottom: 10px;
        }
        .left-hidden {
            display: none !important;
        }
        .left-result-list {
            margin: 0;
        }
        .note-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .note-list-icon {
            width: 25px;
            height: 20px;
            flex: 0 0 auto;
            color: #4db2df;
        }
        .note-list-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .note-list-text {
            min-width: 0;
            overflow-wrap: anywhere;
            line-height: 1.45;
        }
        .note-list-item--root {
            border: 1px solid #cfe0f7;
            background: #f8fbff;
            font-weight: 900;
        }
        .note-list-item--root .note-list-icon {
            color: #0b63d1;
        }
        .note-list-item--child {
            position: relative;
            margin: 4px 0 0 30px;
            padding-left: 18px;
        }
        #mainDirectories.note-list-tree .note-list-item--root {
            margin-bottom: 6px;
        }
        #mainDirectories.note-list-tree .note-list-item--child::before {
            content: "";
            position: absolute;
            left: 0;
            top: -10px;
            bottom: 50%;
            width: 13px;
            border-left: 2px solid #d9e2ef;
            border-bottom: 2px solid #d9e2ef;
            border-bottom-left-radius: 10px;
        }
        #mainDirectories.note-list-tree .note-list-item--child::after {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            bottom: -10px;
            border-left: 2px solid #d9e2ef;
        }
        #mainDirectories.note-list-tree .note-list-item--child:last-child::after {
            display: none;
        }
        #mainDirectories li.selected-note,
        #mainDirectories li.selected-note:hover {
            background-color: #0b63d1;
            color: #fff;
        }
        #mainDirectories li.selected-note::before {
            display: none;
        }
        #mainDirectories li.selected-note .note-list-text {
            color: inherit;
        }
        .search-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
        }
        .search-option { font-size: 0.9em; color: #555; display: inline-flex; align-items: center; gap: 4px; }
        .search-option input { margin: 0; }
        #attachment-filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .filter-option {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-start;
        }
        .extension-options {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            padding-left: 2px;
        }
        .extension-option {
            font-size: 0.8em;
            color: #555;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        #document-section {
            margin-top: 24px;
        }
        #document-section h3 {
            margin: 0 0 12px;
            font-size: 1.05em;
        }
        #document-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .document-entry {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 0.95em;
        }
        .document-view-link {
            font-weight: 600;
        }
        .document-view-link.active {
            color: #003d99;
        }
        .document-download-link {
            font-size: 0.85em;
            color: #666;
            display: inline-block;
        }
        #document-viewer {
            margin-top: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            min-height: 320px;
            background: #fafafa;
            position: relative;
            overflow: hidden;
        }
        #document-viewer iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        #document-viewer-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 0.95em;
            text-align: center;
            padding: 24px;
        }
        #download-links p {
            margin: 10px 0;
        }
        #download-links a {
            text-decoration: none;
            color: #0366d6;
        }
        #download-links a:hover {
            text-decoration: underline;
        }
        .file-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background-color: #e6ecfa;
            color: #1c3a71;
            font-size: 0.72em;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .file-badge[data-type="video"] {
            background-color: #ffe8ea;
            color: #831f2f;
        }
        .file-badge[data-type="audio"] {
            background-color: #f3e6ff;
            color: #5b238b;
        }
        .file-badge[data-type="document"] {
            background-color: #e6f7f0;
            color: #186947;
        }
        .file-badge[data-type="other"] {
            background-color: #f0f0f0;
            color: #555;
        }
        /* SOFTM-share-url-box 2026-06-03: SNS 아이콘 행과 URL 복사 입력형 공유 패널 시작 */
        .share-section {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
        }
        .share-toggle-button,
        .share-button,
        .share-url-copy {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            font: inherit;
            transition: background-color 0.2s ease, transform 0.2s ease, filter 0.2s ease;
        }
        .share-toggle-button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #1f2937;
            color: #fff;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.16);
        }
        .share-toggle-button:hover,
        .share-section.is-open .share-toggle-button {
            background-color: #0b63d1;
            transform: translateY(-1px);
        }
        .share-toggle-button svg {
            width: 17px;
            height: 17px;
        }
        .share-panel {
            position: fixed;
            z-index: 3000;
            box-sizing: border-box;
            width: min(424px, calc(100vw - 24px));
            padding: 14px;
            border: 1px solid #cfd6e1;
            border-radius: 8px;
            background-color: #fff;
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.18);
        }
        .share-panel[hidden] {
            display: none;
        }
        .share-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 12px;
        }
        .share-variant-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            width: max-content;
            max-width: 100%;
            margin: 0 auto 12px;
            padding: 2px;
            border: 1px solid #d8e0ec;
            border-radius: 999px;
            background: #f1f5f9;
        }
        .share-variant-button {
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: #1f2937;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            min-width: 48px;
            padding: 4px 10px;
            text-align: center;
            font-size: 0.82em;
        }
        .share-variant-button:hover {
            background: #eaf2ff;
        }
        .share-variant-button[aria-pressed="true"] {
            background: #4b5563;
            color: #fff;
        }
        .share-button {
            width: 54px;
            height: 54px;
            padding: 0;
            border-radius: 10px;
            color: #fff;
        }
        .share-button svg {
            width: 38px;
            height: 38px;
        }
        .share-toggle-button:focus-visible,
        .share-button:focus-visible,
        .share-url-copy:focus-visible,
        .share-url-input:focus-visible {
            outline: 3px solid rgba(3, 102, 214, 0.45);
            outline-offset: 2px;
        }
        .share-button .share-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .share-button:hover {
            filter: brightness(0.96);
            transform: translateY(-1px);
        }
        .share-button[data-network="kakao"] {
            background-color: #fee500;
            color: #3c1e1e;
        }
        .share-button[data-network="line"] {
            background-color: #06c755;
        }
        .share-button[data-network="facebook"] {
            background-color: #1877f2;
        }
        .share-button[data-network="twitter"] {
            background-color: #55acee;
        }
        .share-button[data-network="band"] {
            background-color: #37b24d;
        }
        .share-url-row {
            display: flex;
            width: 100%;
            overflow: hidden;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background-color: #fff;
        }
        .share-url-input {
            flex: 1 1 auto;
            min-width: 0;
            height: 42px;
            border: 0;
            border-right: 1px solid #cbd5e1;
            padding: 0 12px;
            background-color: #eef2f7;
            color: #202a37;
            font: inherit;
            font-size: 1em;
        }
        .share-url-copy {
            flex: 0 0 auto;
            min-width: 96px;
            height: 42px;
            padding: 0 14px;
            background-color: #fff;
            color: #475569;
            font-weight: 700;
            white-space: nowrap;
        }
        .share-url-copy:hover {
            background-color: #f8fafc;
        }
        .share-feedback {
            min-height: 18px;
            margin-top: 6px;
            text-align: right;
            font-size: 0.85em;
            color: #1d3b70;
        }
        .share-feedback.share-feedback--error {
            color: #a11;
        }
        .directory-viewer-nav .share-section--viewer .share-toggle-button {
            width: 32px;
            height: 32px;
            padding: 0;
            border: 0;
        }
        .directory-viewer-nav .share-section--viewer .share-variant-button {
            min-width: 48px;
            padding: 4px 10px;
        }
        /* SOFTM-share-url-box 2026-06-03: SNS 아이콘 행과 URL 복사 입력형 공유 패널 끝 */
        #content {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        .markdown-viewer {
            width: 100%;
            box-sizing: border-box; /* SOFTM-markdown-viewer-sizing 2026-07-10: 좁은 미리보기 패널에서 padding 포함 폭으로 계산 */
            min-height: 500px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 24px;
            background: #fff;
            overflow: auto;
            font-size: 16px;
            line-height: 1.72;
        }
        .markdown-viewer h1,
        .markdown-viewer h2,
        .markdown-viewer h3,
        .markdown-viewer h4,
        .markdown-viewer h5,
        .markdown-viewer h6 {
            margin: 1.2em 0 0.55em;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 0.25em;
        }
        .markdown-viewer h1:first-child,
        .markdown-viewer h2:first-child,
        .markdown-viewer h3:first-child,
        .markdown-viewer h4:first-child,
        .markdown-viewer h5:first-child,
        .markdown-viewer h6:first-child {
            margin-top: 0;
        }
        .markdown-viewer h4,

<body>
    <nav>

    <div class="container">
        <div id="file-list">
            <div class="list-header">
                <div class="list-header-top">
                    <h1>메인</h1>

                </div>
                <div class="left-menu-tabs" role="tablist" aria-label="왼쪽 메뉴">
                    <button type="button" class="left-menu-tab is-active" data-left-tab="main" role="tab" aria-selected="true" aria-controls="mainDirectoryPanel">메인</button>
                    <button type="button" class="left-menu-tab" data-left-tab="search" role="tab" aria-selected="false" aria-controls="searchPanel">검색</button>
                </div>
                <div id="mainDirectoryPanel" class="left-tab-panel" role="tabpanel">
                    <div class="publishing-condition-row">
                        <input type="search" id="mainDirectorySearchInput" placeholder="디렉토리 검색" autocomplete="off">
                        <label class="publishing-condition-field">
                        <select id="mainPublishingFilter" class="publishing-condition-select" aria-label="메인 게시 상태 조건" title="게시 상태">
                            <option value="all">전체</option>
                            <option value="published">게시</option>
                            <option value="unpublished">미게시</option>
                        </select>
                        </label>
                    </div><!-- SOFTM-publishing-filter-inline 2026-07-10: 메인 게시 조건을 검색 입력 줄에 통합 -->
                </div>
                <div id="searchPanel" class="search-controls left-tab-panel left-hidden" role="tabpanel">
                    <div class="publishing-condition-row">
                        <input type="text" id="searchInput" onkeyup="searchFiles()" placeholder="파일 검색...">
                        <label class="publishing-condition-field">
                        <select id="searchPublishingFilter" class="publishing-condition-select" aria-label="검색 게시 상태 조건" title="게시 상태">
                            <option value="all">전체</option>
                            <option value="published">게시</option>
                            <option value="unpublished">미게시</option>
                        </select>
                        </label>
                    </div><!-- SOFTM-publishing-filter-inline 2026-07-10: 검색 게시 조건을 검색 입력 줄에 통합 -->
                    <label class="search-option">
                        <input type="checkbox" id="titleOnlyCheckbox" onchange="searchFiles()">

                    </label>
                    <div id="attachment-filter-options">
                        <div class="filter-option">
                            <label class="search-option">
                                <input type="checkbox" id="imageFilter" onchange="handleAttachmentFilterToggle('image')">
                                이미지
                            </label>
                            <div class="extension-options" id="imageExtensions"></div>
                        </div>
                        <div class="filter-option">
                            <label class="search-option">
                                <input type="checkbox" id="videoFilter" onchange="handleAttachmentFilterToggle('video')">
                                동영상
                            </label>
                            <div class="extension-options" id="videoExtensions"></div>
                        </div>
                        <div class="filter-option">
                            <label class="search-option">
                                <input type="checkbox" id="audioFilter" onchange="handleAttachmentFilterToggle('audio')">
                                음성
                            </label>
                            <div class="extension-options" id="audioExtensions"></div>
                        </div>
                        <div class="filter-option">
                            <label class="search-option">
                                <input type="checkbox" id="documentFilter" onchange="handleAttachmentFilterToggle('document')">
                                문서
                            </label>
                            <div class="extension-options" id="documentExtensions"></div>
                        </div>
                    </div>
                </div>

            <ul id="files" class="left-result-list left-hidden"></ul>

    <script src="lib/index-page.js?v=20260710-publishing-filter-local-only"></script><!-- SOFTM-publishing-filter-local-only 2026-07-10: 메인/검색 게시 상태 조건 로컬 전용 처리 캐시 갱신 -->

            <span class="close">&times;</span>
        </div>
        <div class="modal-body" id="modalBody">
        </div>
      </div>
    </div>

    <script>
        function navigateWithSearch(event, target) {
            event.preventDefault();
            const params = new URLSearchParams();
            const publishingFilterEnabled = window.PublishingUtils && typeof window.PublishingUtils.isPublishingFilterEnabled === 'function' && window.PublishingUtils.isPublishingFilterEnabled();
            const activeSearchPanel = document.getElementById('searchPanel');
            const publishingFilter = activeSearchPanel && !activeSearchPanel.classList.contains('left-hidden')
                ? document.getElementById('searchPublishingFilter')
                : document.getElementById('mainPublishingFilter');
            if (publishingFilterEnabled && publishingFilter && publishingFilter.value && publishingFilter.value !== 'all') {
                params.set('publish', publishingFilter.value);
            } // SOFTM-publishing-filter-local-only 2026-07-10: 로컬 점검 환경에서만 게시 조건을 메뉴 이동 URL에 유지
            const query = params.toString();
            window.location.href = query ? `${target}?${query}` : target;
        }
    </script><!-- SOFTM-publishing-filter-local-only 2026-07-10: 원격 공개 화면에서는 게시 상태 조건 URL 전달 제외 -->

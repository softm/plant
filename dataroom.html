<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료실</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; line-height: 1.6; margin: 0; }
        nav {
            background-color: #f8f9fa;
            padding: 10px 20px;
            border-bottom: 1px solid #ccc;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        nav a { margin-right: 15px; text-decoration: none; color: #0366d6; font-weight: bold; }
        .container { padding: 14px 20px 18px; }
        #searchInput {
            width: 100%;
            padding: 10px 12px;
            box-sizing: border-box;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            font-size: 15px;
        }
        .list-header {
            position: sticky;
            top: 50px;
            z-index: 2;
            background-color: #fff;
            padding: 10px 0 10px;
        }
        .list-header.is-search-options-open {
            z-index: 9000;
        } /* SOFTM-dataroom-filter-top-layer 2026-07-10: 필터 팝업이 뷰어 확대/축소 버튼보다 위에 표시되도록 헤더 레이어 승격 */
        .list-header h1 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1.85rem;
            line-height: 1.2;
        }
        .search-controls {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }
        .search-bar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto auto;
            gap: 8px;
            align-items: center;
        }
        .search-command-button,
        .search-icon-button,
        .search-reset-button {
            border: 1px solid #d0d7de;
            border-radius: 8px;
            background: #fff;
            color: #24292f;
            cursor: pointer;
            font-weight: 600;
            min-height: 40px;
            padding: 0 14px;
        }
        .search-icon-button {
            min-width: 40px;
            padding: 0 12px;
        }
        .search-command-button {
            background: #0969da;
            border-color: #0969da;
            color: #fff;
        }
        .filter-toggle-button {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-width: 86px;
            justify-content: center;
        }
        .filter-toggle-button[aria-expanded="true"] {
            background: #f0f6ff;
            border-color: #0969da;
            color: #0969da;
        }
        .filter-count-badge {
            display: none;
            align-items: center;
            justify-content: center;
            min-width: 19px;
            height: 19px;
            padding: 0 6px;
            border-radius: 999px;
            background: #0969da;
            color: #fff;
            font-size: 12px;
            line-height: 1;
        }
        .filter-count-badge.is-visible {
            display: inline-flex;
        }
        .search-status {
            min-height: 20px;
            color: #57606a;
            font-size: 0.9em;
        }
        /* SOFTM-publishing-github 2026-07-09: 자료실 퍼블리싱 GitHub 반영 패널/토글 스타일 시작 */
        .publishing-panel {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            border: 1px solid #d8e0ec;
            border-radius: 8px;
            background: #f8fafc;
            padding: 8px;
            margin-bottom: 10px;
            color: #334155;
            font-size: 0.88em;
        }
        .publishing-token-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 800;
        }
        .publishing-token-input {
            width: min(280px, 42vw);
            min-height: 32px;
            border: 1px solid #cbd5e1;
            border-radius: 7px;
            padding: 0 8px;
            font: inherit;
        }
        .publishing-save-button,
        .publishing-toggle {
            border: 1px solid #cbd5e1;
            border-radius: 999px;
            background: #fff;
            color: #1f2937;
            cursor: pointer;
            font: inherit;
            font-weight: 800;
        }
        .publishing-save-button {
            min-height: 32px;
            padding: 0 10px;
        }
        .publishing-save-button:not(:disabled):hover,
        .publishing-toggle:hover {
            border-color: #0969da;
            color: #0969da;
        }
        .publishing-save-button:disabled {
            cursor: default;
            opacity: 0.55;
        }
        .publishing-refresh-button.is-attention:not(:disabled) {
            border-color: #f79009;
            background: #fffaeb;
            color: #b54708;
        }
        .publishing-toggle {
            flex: 0 0 auto;
            min-height: 26px;
            padding: 0 8px;
            font-size: 0.78em;
            line-height: 1;
            white-space: nowrap; /* SOFTM-publishing-current-state 2026-07-09: 현재 게시 상태 문구가 자료실 행에서 줄바꿈되지 않게 고정 */
        }
        .publishing-toggle[data-published="false"] {
            border-color: #f1b8b8;
            background: #fff7ed;
            color: #b42318;
        }
        .publishing-meta {
            font-weight: 800;
            color: #64748b;
        }
        .publishing-sync-chip {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            border: 1px solid #cbd5e1;
            border-radius: 999px;
            padding: 0 8px;
            background: #fff;
            color: #475467;
            font-weight: 800;
            white-space: nowrap;
        }
        .publishing-sync-chip[data-type="success"] {
            border-color: #abefc6;
            background: #ecfdf3;
            color: #067647;
        }
        .publishing-sync-chip[data-type="pending"] {
            border-color: #fedf89;
            background: #fffaeb;
            color: #b54708;
        }
        .publishing-sync-chip[data-type="error"] {
            border-color: #fecdca;
            background: #fef3f2;
            color: #b42318;
        } /* SOFTM-publishing-sync-notice 2026-07-10: 자료실 퍼블리싱 원격 동기화 상태 chip 스타일 추가 */
        .publishing-status {
            flex: 1 1 180px;
            min-width: 160px;
            color: #64748b;
        }
        .publishing-status[data-type="error"] {
            color: #b42318;
        }
        .publishing-status[data-type="success"] {
            color: #067647;
        }
        .dataroom-publishing-slot {
            margin-left: auto;
        }
        /* SOFTM-publishing-github 2026-07-09: 자료실 퍼블리싱 GitHub 반영 패널/토글 스타일 끝 */
        .search-options-panel {
            /* SOFTM-dataroom-filter-popover 2026-05-16: 필터 패널이 탐색기 본문을 아래로 밀지 않도록 팝오버화 시작 */
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            z-index: 9001;
            width: min(680px, 100%);
            max-height: min(62vh, 520px);
            overflow: auto;
            border: 1px solid #d8dee4;
            border-radius: 14px;
            background: #fff;
            padding: 14px;
            box-shadow: 0 10px 28px rgba(27, 31, 36, 0.08);
        }
        /* SOFTM-dataroom-filter-popover-END */
        .search-option-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }
        .search-option-group:last-child { margin-bottom: 0; }
        .search-option-title {
            flex: 0 0 82px;
            color: #24292f;
            font-size: 0.9em;
            font-weight: 700;
        }
        .search-option { font-size: 0.9em; color: #555; display: inline-flex; align-items: center; gap: 4px; }
        .search-option input { margin: 0; }
        .filter-select {
            min-width: 180px;
            min-height: 36px;
            border: 1px solid #d0d7de;
            border-radius: 10px;
            background: #fff;
            color: #24292f;
            font: inherit;
            padding: 0 10px;
        }
        .filter-select.publishing-filter-select {
            min-width: 104px;
            min-height: 32px;
            border-radius: 999px;
            font-weight: 700;
            padding: 0 24px 0 10px;
        } /* SOFTM-publishing-filter-compact 2026-07-10: 자료실 게시 상태 조건 select 폭 축소 */
        .segmented-filter {
            display: inline-flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 4px;
            border: 1px solid #d8dee4;
            border-radius: 999px;
            background: #fff;
        }
        .segmented-filter .search-option,
        .filter-chip {
            min-height: 32px;
            border: 1px solid transparent;
            border-radius: 999px;
            padding: 0 12px;
            background: transparent;
            color: #57606a;
            cursor: pointer;
            font-weight: 700;
        }
        .segmented-filter input,
        .filter-chip input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        .segmented-filter .search-option:has(input:checked),
        .filter-chip:has(input:checked) {
            background: #0969da;
            border-color: #0969da;
            color: #fff;
            box-shadow: 0 4px 12px rgba(9, 105, 218, 0.2);
        }
        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #fff;
            border-color: #d8dee4;
        }
        .search-option-actions {
            display: flex;
            justify-content: flex-end;
        }
        #attachment-filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .filter-option {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-start;
        }
        .extension-options {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            padding-left: 2px;
            max-width: 100%;
        }
        .extension-option {
            font-size: 0.8em;
            color: #555;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            min-height: 26px;
            padding: 0 8px;
            border: 1px solid #d8dee4;
            border-radius: 999px;
            background: #fff;
        }
        @media (max-width: 720px) {
            .search-bar {
                grid-template-columns: minmax(0, 1fr) auto auto;
            }
            .search-command-button {
                grid-column: 1 / -1;
            }
            .search-option-title {
                flex-basis: 100%;
            }
        }
        .dataroom-workspace {
            display: grid;
            grid-template-columns: minmax(280px, 32%) minmax(0, 1fr);
            gap: 0;
            min-height: 560px;
            border: 1px solid #d8dee4;
            border-radius: 10px;
            background: #fff;
            overflow: hidden;
            box-shadow: 0 10px 28px rgba(27, 31, 36, 0.06);
        }
        .dataroom-results-panel {
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #d8dee4;
            background: #f8fafc;
        }
        .dataroom-results-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-height: 42px;
            padding: 8px 10px;
            border-bottom: 1px solid #e5e9f0;
            background: #f7f9fc;
        }
        .dataroom-results-head strong {
            color: #1f2937;
            font-size: 0.94em;
        }
        .dataroom-results-hint {
            color: #667085;
            font-size: 0.78em;
            font-weight: 700;
            white-space: nowrap;
        }
        .dataroom-mobile-action-bar {
            display: none;
        }
        #file-list {
            list-style-type: none;
            padding: 6px;
            margin: 0;
            flex: 1 1 auto;
            min-height: 0;
            max-height: calc(100vh - 250px);
            overflow: auto;
            border: 0;
            border-radius: 0;
            background: transparent;
        }
        #file-list li {
            display: flex;
            align-items: center;
            min-width: 0;
            margin: 0;
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 7px 8px;
            cursor: pointer;
            background: transparent;
            transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
        }
        #file-list li:hover,
        #file-list li:focus {
            background: #eef4ff;
            border-color: #c9d8f0;
            outline: none;
        }
        #file-list li.is-selected {
            background: #0b63d1;
            border-color: #0b63d1;
            color: #fff;
        }
        #file-list li.is-selected a,
        #file-list li.is-selected .attach-file,
        #file-list li.is-selected .html-file {
            color: #fff;
        }
        #file-list li.is-selected .html-file {
            color: rgba(255, 255, 255, 0.78);
        }
        #file-list li.is-selected .file-badge,
        #file-list li.is-selected .attachment-badge,
        #file-list li.is-selected .dataroom-mini-icon:not(.dataroom-mini-folder) {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
        }
        #file-list.is-drag-selecting,
        #file-list.is-drag-selecting * {
            cursor: crosshair;
            user-select: none;
        }
        .dataroom-drag-selection-box {
            position: fixed;
            z-index: 1800;
            display: none;
            pointer-events: none;
            border: 1px solid rgba(9, 105, 218, 0.78);
            background: rgba(9, 105, 218, 0.16);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.42) inset;
        } /* SOFTM-dataroom-drag-select 2026-05-17: 자료실 드래그 선택 중 선택 영역과 커서를 표시 */
        /* SOFTM-dataroom-explorer-style 2026-05-16: 자료실 왼쪽 목록을 메인 탐색기와 같은 압축형 사이드바 목록으로 정리 시작 */
        #file-list img,
        #file-list .file-badge,
        #file-list .attachment-preview .attachment-thumb,
        #file-list .attachment-row .attachment-badge {
            width: 36px;
            height: 36px;
            margin-right: 0;
            flex-shrink: 0;
            border-radius: 8px;
            font-size: 0.68em;
        }
        .attachment-preview { display: inline-flex; align-items: center; gap: 12px; margin-right: 15px; text-decoration: none; color: inherit; cursor: pointer; }
        .attachment-preview .attachment-thumb { display: flex; align-items: center; justify-content: center; width: 80px; height: 80px; border-radius: 12px; overflow: hidden; background: #f2f2f2; }
        .attachment-preview img { width: 100%; height: 100%; object-fit: cover; }
        .attachment-preview.video .attachment-thumb { background: #ffe8ea; }
        .attachment-preview .attachment-name { font-weight: 700; }
        #file-list .attachment-preview {
            gap: 8px;
            margin-right: 0;
        }
        #file-list .attachment-preview .attachment-name,
        #file-list .file-info .attach-file {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #1f2937;
            font-size: 0.9em;
            line-height: 1.25;
        }
        .attachment-row { display: flex; align-items: center; gap: 12px; min-width: 0; }
        #file-list .attachment-row {
            gap: 8px;
        }
        .attachment-row .attachment-badge { display: inline-flex; align-items: center; justify-content: center; border-radius: 16px; background: #f0f0f0; }
        .file-info { display: flex; flex-direction: column; min-width: 0; width: 100%; gap: 3px; }
        .file-info .html-file {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.76em;
            color: #667085;
        }
        .file-info .html-file a {
            color: inherit;
        }
        .file-info .attach-file { font-weight: 800; }
        #file-list .document-download-link {
            display: none;
        }
        #file-list .dataroom-mini-icon {
            width: 36px;
            height: 36px;
        }
        #file-list .dataroom-mini-folder svg {
            width: 36px;
            height: 28px;
        }
        /* SOFTM-dataroom-explorer-style-END */
        .dataroom-directory-link {
            border: 0;
            background: transparent;
            padding: 0;
            color: inherit;
            cursor: pointer;
            font: inherit;
            text-align: left;
        }
        .dataroom-explorer {
            min-width: 0;
            min-height: 560px;
            border: 0;
            border-radius: 0;
            background: #fff;
            overflow: hidden;
        }
        .dataroom-explorer-empty {
            height: 100%;
            min-height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667085;
            padding: 24px;
            text-align: center;
        }
        /* SOFTM-dataroom-explorer-surface 2026-05-16: 오른쪽 자료실 탐색 영역에 메인 탐색기형 상단 바와 본문 분할 레이아웃 적용 시작 */
        .dataroom-explorer-shell {
            height: calc(100vh - 250px);
            min-height: 560px;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            background: #fff;
        }
        .dataroom-explorer-toolbar {
            flex: 0 0 auto;
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 7px 10px;
            border-bottom: 1px solid #e5e9f0;
            background: #f7f9fc;
        }
        .dataroom-explorer-title {
            min-width: 0;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        .dataroom-explorer-title strong {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #1f2937;
            font-size: 0.96em;
        }
        .dataroom-explorer-title span {
            flex: 0 0 auto;
            color: #667085;
            font-size: 0.8em;
            font-weight: 700;
        }
        .dataroom-explorer-actions {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .dataroom-explorer-action {
            min-height: 28px;
            border: 1px solid #ccd3df;
            border-radius: 999px;
            background: #fff;
            color: #344054;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            font: inherit;
            font-size: 0.82em;
            font-weight: 800;
            text-decoration: none;
            white-space: nowrap;
        }
        .dataroom-explorer-action:hover,
        .dataroom-explorer-action:focus-visible {
            background: #eef4ff;
            border-color: #9db7dc;
            color: #0b63ce;
            outline: none;
            text-decoration: none;
        }
        .dataroom-explorer-body {
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
        }
        /* SOFTM-dataroom-explorer-surface-END */
        .dataroom-file-preview {
            display: grid;
            grid-template-rows: minmax(0, 1fr) auto;
            min-height: 0;
            height: 100%;
        }
        .dataroom-file-preview-pane {
            min-height: 0;
            overflow: hidden;
            background: #fff;
        }
        .dataroom-file-preview-pane .directory-viewer-pane {
            min-height: 0;
        }
        .dataroom-file-preview-meta {
            border-top: 1px solid #d8dee4;
            padding: 16px 18px;
            background: #fff;
        }
        .dataroom-file-preview-meta strong {
            display: block;
            font-size: 1.05em;
            word-break: break-word;
        }
        .dataroom-file-preview-meta span {
            display: block;
            margin-top: 4px;
            color: #667085;
            font-size: 0.9em;
        }
        .dataroom-directory-browser {
            height: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: #fff;
        }
        .dataroom-directory-split {
            /* SOFTM-dataroom-column-fit 2026-05-16: 디렉토리 컬럼이 남는 공간을 억지로 차지하지 않고 내용 너비만큼 배치되도록 조정 시작 */
            display: flex;
            flex: 1 1 auto;
            min-height: 0;
            min-width: 0;
        }
        .dataroom-directory-columns {
            display: flex;
            flex: 0 1 auto;
            min-width: min(320px, 100%);
            max-width: 68%;
            overflow-x: auto;
            overflow-y: hidden;
            background: #fff;
        }
        .dataroom-directory-column {
            flex: 0 0 280px;
            min-width: 0;
            overflow: auto;
            border-right: 1px solid #d8dee4;
            padding: 8px;
        }
        .dataroom-column-item {
            width: 100%;
            border: 1px solid transparent;
            border-radius: 8px;
            background: #fff;
            color: #1f2937;
            cursor: pointer;
            display: grid;
            grid-template-columns: 36px minmax(0, 1fr) 18px;
            align-items: center;
            gap: 8px;
            padding: 8px;
            text-align: left;
            font: inherit;
        }
        .dataroom-column-item:hover {
            border-color: #b8c6dc;
            background: #f6f9ff;
        }
        .dataroom-column-item:focus {
            border-color: #9db7dc;
            background: #f6f9ff;
            outline: none;
        }
        .dataroom-column-item.is-selected {
            background: #0b63d1;
            border-color: #0b63d1;
            color: #fff;
        }
        .dataroom-column-item.is-selected .dataroom-column-meta,
        .dataroom-column-item.is-selected .dataroom-column-chevron {
            color: rgba(255, 255, 255, 0.78);
        }
        .dataroom-column-item.is-selected .dataroom-mini-icon:not(.dataroom-mini-folder) {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
        }

    <script src="lib/dataroom-page.js?v=20260710-publishing-filter-local-only"></script><!-- SOFTM-publishing-filter-local-only 2026-07-10: 자료실 게시 상태 조건 로컬 전용 처리 캐시 갱신 -->
    <script>
        function navigateWithSearch(event, target) {
            event.preventDefault();
            const params = new URLSearchParams();
            const publishingFilterEnabled = window.PublishingUtils && typeof window.PublishingUtils.isPublishingFilterEnabled === 'function' && window.PublishingUtils.isPublishingFilterEnabled();
            const publishingFilter = document.getElementById('publishingFilter');
            if (publishingFilterEnabled && publishingFilter && publishingFilter.value && publishingFilter.value !== 'all') {
                params.set('publish', publishingFilter.value);
            } // SOFTM-publishing-filter-local-only 2026-07-10: 로컬 점검 환경에서만 게시 조건을 메뉴 이동 URL에 유지
            const query = params.toString();
            window.location.href = query ? `${target}?${query}` : target;
        }
    </script><!-- SOFTM-publishing-filter-local-only 2026-07-10: 원격 공개 화면에서는 게시 상태 조건 URL 전달 제외 -->

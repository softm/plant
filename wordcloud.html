<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>워드클라우드</title>
    <style>
        :root {
            --bg: #f6f7f4;
            --panel: #ffffff;
            --line: #dfe5dc;
            --text: #20231f;
            --muted: #667064;
            --accent: #2f6f4e;
            --accent-2: #8a4b2a;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            background: var(--bg);
            color: var(--text);
        }
        nav {
            background-color: #f8f9fa;
            padding: 10px 20px;
            border-bottom: 1px solid #ccc;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        nav a { margin-right: 15px; text-decoration: none; color: #0366d6; font-weight: bold; }
        main { padding: 24px 32px 48px; max-width: 1280px; margin: 0 auto; }
        .header {
            position: sticky;
            top: 45px;
            z-index: 4;
            background: var(--bg);
            padding: 12px 0 16px;
        }
        h1 { margin: 0 0 12px; font-size: 28px; letter-spacing: 0; }
        .controls {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            gap: 10px;
            align-items: center;
        } /* SOFTM-publishing-filter-compact 2026-07-10: 워드클라우드 select 고정폭을 내용 기준 compact 폭으로 축소 */
        .controls input { min-width: 0; }
        .controls select {
            width: 96px;
            min-width: 0;
        }
        input, select {
            height: 40px;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 0 12px;
            font-size: 15px;
            background: #fff;
        }
        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 340px;
            gap: 18px;
            align-items: start;
        }
        section {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px;
        }
        h2 { margin: 0 0 14px; font-size: 18px; }
        #cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            align-items: center;
            min-height: 360px;
        }
        .tag {
            border: 0;
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            font-weight: 700;
            line-height: 1.15;
            padding: 2px 4px;
            border-radius: 6px;
        }
        .tag:nth-child(3n) { color: var(--accent-2); }
        .tag:hover, .tag:focus { background: #eaf1e9; outline: none; }
        #labels {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 70vh;
            overflow: auto;
        }
        .label-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 8px;
        }
        .label-row button {
            border: 0;
            background: transparent;
            color: #0366d6;
            cursor: pointer;
            text-align: left;
            padding: 0;
            font: inherit;
            font-weight: 600;
            overflow-wrap: anywhere;
        }
        .count { color: var(--muted); font-size: 13px; white-space: nowrap; }
        #meta { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
        @media (max-width: 900px) {
            main { padding: 16px; }
            .layout { grid-template-columns: 1fr; }
            .controls { grid-template-columns: minmax(0, 1fr) auto auto; }
            .controls input { grid-column: 1 / -1; }
            .header { top: 43px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="#" onclick="navigateWithSearch(event, 'index.html')">메인</a>
        <a href="#" onclick="navigateWithSearch(event, 'dataroom.html')">자료실</a>
        <a href="#" onclick="navigateWithSearch(event, 'wordcloud.html')">워드클라우드</a>
    </nav>
    <main>
        <div class="header">
            <h1>워드클라우드</h1>
            <div class="controls">
                <input type="search" id="searchInput" placeholder="태그 검색">
                <select id="limitSelect" aria-label="표시 개수">
                    <option value="80">80개</option>
                    <option value="120" selected>120개</option>
                    <option value="200">200개</option>
                </select>
                <select id="publishingFilter" aria-label="게시 상태 조건">
                    <option value="all">전체</option>
                    <option value="published">게시</option>
                    <option value="unpublished">미게시</option>
                </select><!-- SOFTM-publishing-condition-filter 2026-07-10: 워드클라우드 게시 상태 조건 추가 -->
            </div>
        </div>
        <div id="meta"></div>
        <div class="layout">
            <section>
                <h2>클라우드</h2>
                <div id="cloud"></div>
            </section>
            <section>
                <h2>태그</h2>
                <div id="labels"></div>
            </section>
        </div>
    </main>
    <script src="lib/files-index-utils.js?v=20260710-publishing-condition-filter"></script><!-- SOFTM-publishing-condition-filter 2026-07-10: 게시 상태 조건으로 워드클라우드 집계 필터링 -->
    <script src="lib/publishing-utils.js?v=20260710-publishing-filter-local-only"></script><!-- SOFTM-publishing-filter-local-only 2026-07-10: 게시 상태 검색 조건을 로컬 전용으로 제한하는 공통 유틸 캐시 갱신 -->
    <script src="lib/wordcloud-page.js?v=20260710-publishing-filter-local-only"></script><!-- SOFTM-publishing-filter-local-only 2026-07-10: 워드클라우드 게시 상태 조건 로컬 전용 처리 캐시 갱신 -->
    <script>
        function navigateWithSearch(event, target) {
            event.preventDefault();
            const searchInput = document.getElementById('searchInput');
            const params = new URLSearchParams();
            if (searchInput && searchInput.value.trim()) {
                params.set('search', searchInput.value.trim());
            }
            const publishingFilterEnabled = window.PublishingUtils && typeof window.PublishingUtils.isPublishingFilterEnabled === 'function' && window.PublishingUtils.isPublishingFilterEnabled();
            const publishingFilter = document.getElementById('publishingFilter');
            if (publishingFilterEnabled && publishingFilter && publishingFilter.value && publishingFilter.value !== 'all') {
                params.set('publish', publishingFilter.value);
            } // SOFTM-publishing-filter-local-only 2026-07-10: 로컬 점검 환경에서만 워드클라우드 게시 조건 URL 유지
            const query = params.toString();
            window.location.href = query ? `${target}?${query}` : target;
        }
    </script>
</body>
</html>
